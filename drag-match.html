<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag & Match</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      font-family: sans-serif;
      color: white;
      gap: 80px;
    }

    h2 {
      margin: 0;
      opacity: 0.6;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .arena {
      display: flex;
      align-items: center;
      gap: 100px;
    }

    .box {
      width: 100px;
      height: 100px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #draggable {
      background: #e94560;
      cursor: grab;
      box-shadow: 0 0 20px #e9456066;
      position: relative;
      z-index: 10;
    }

    #draggable:active {
      cursor: grabbing;
    }

    #draggable.dragging {
      opacity: 0.85;
      transform: scale(1.1);
    }

    #target {
      background: #0f3460;
      border: 3px dashed #16213e;
      box-shadow: 0 0 20px #0f346066;
    }

    #target.highlight {
      border-color: #e94560;
      box-shadow: 0 0 30px #e9456099;
    }

    .boom {
      font-size: 4rem;
      animation: pop 0.6s ease forwards;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    @keyframes pop {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      50%  { opacity: 1; transform: translate(-50%, -50%) scale(1.8); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
    }

    button {
      padding: 10px 28px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: none;
    }

    button:hover {
      background: #c73652;
    }
  </style>
</head>
<body>

  <h2>Drag the red onto the blue</h2>

  <div class="arena">
    <div class="box" id="draggable" draggable="true">🔴</div>
    <div class="box" id="target">🔵</div>
  </div>

  <button id="reset">Play again</button>

  <script>
    const draggable = document.getElementById('draggable');
    const target    = document.getElementById('target');
    const reset     = document.getElementById('reset');

    // --- Drag events ---
    draggable.addEventListener('dragstart', () => {
      draggable.classList.add('dragging');
    });

    draggable.addEventListener('dragend', () => {
      draggable.classList.remove('dragging');
      target.classList.remove('highlight');
    });

    target.addEventListener('dragover', e => {
      e.preventDefault();
      target.classList.add('highlight');
    });

    target.addEventListener('dragleave', () => {
      target.classList.remove('highlight');
    });

    target.addEventListener('drop', e => {
      e.preventDefault();
      vanish();
    });

    // --- Touch support (mobile) ---
    let startX, startY, clone;

    draggable.addEventListener('touchstart', e => {
      const t = e.touches[0];
      startX = t.clientX - draggable.getBoundingClientRect().left;
      startY = t.clientY - draggable.getBoundingClientRect().top;

      clone = draggable.cloneNode(true);
      clone.style.cssText = `
        position: fixed;
        width: 100px; height: 100px;
        border-radius: 16px;
        background: #e94560;
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem;
        opacity: 0.85;
        pointer-events: none;
        z-index: 999;
        box-shadow: 0 0 20px #e9456066;
        transform: scale(1.1);
      `;
      document.body.appendChild(clone);
      draggable.style.opacity = '0.3';
    }, { passive: true });

    draggable.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      clone.style.left = (t.clientX - startX) + 'px';
      clone.style.top  = (t.clientY - startY) + 'px';

      const cloneRect  = clone.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const overlap    = !(cloneRect.right  < targetRect.left  ||
                           cloneRect.left   > targetRect.right ||
                           cloneRect.bottom < targetRect.top   ||
                           cloneRect.top    > targetRect.bottom);
      target.classList.toggle('highlight', overlap);
    }, { passive: false });

    draggable.addEventListener('touchend', e => {
      const t = e.changedTouches[0];
      const targetRect = target.getBoundingClientRect();

      const hit = t.clientX >= targetRect.left   &&
                  t.clientX <= targetRect.right   &&
                  t.clientY >= targetRect.top     &&
                  t.clientY <= targetRect.bottom;

      clone.remove();
      draggable.style.opacity = '1';
      target.classList.remove('highlight');

      if (hit) vanish();
    });

    // --- Vanish logic ---
    function vanish() {
      draggable.style.display = 'none';
      target.style.display    = 'none';

      const boom = document.createElement('div');
      boom.className = 'boom';
      boom.textContent = '💥';
      document.body.appendChild(boom);
      setTimeout(() => boom.remove(), 700);

      reset.style.display = 'block';
    }

    reset.addEventListener('click', () => {
      draggable.style.display = '';
      target.style.display    = '';
      reset.style.display     = 'none';
    });
  </script>
</body>
</html>
