<!doctype html>
<html lang="pt-PT">
	<head>
		<!-- Definir  -->
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link href="cSS.css" rel="stylesheet" type="text/css">
		<link href="css/product.css?v=2" rel="stylesheet" type="text/css">
		<link rel="stylesheet" href="https://use.typekit.net/uhg8sos.css">
		<link rel="stylesheet" href="https://use.typekit.net/yiz2qnq.css">
		<title>Clover Prints - products</title>
		<link rel="icon" href="SGVs/M.svg" type="image/x-icon" />
	</head>
		<body>
			<header id="header-placeholder"></header>
    <!-- Back Button -->
    <a href="index.html" class="back-button">
      <img src="SGVs/back2.svg" alt="Back icon" class="back-icon">
      &nbsp;Back to Collection
    </a>

	<div class="product-page">
    <div class="product-main">
      <!-- Left Column - Images -->
      <div class="product-images">
        <div class="main-image-container">
          <img alt="Imagem da Ilustração" class="ProfileImageProduct" id="mainImage">
        </div>
        
        <div class="thumbnail-grid">
          <button class="thumbnail active" >
            <img alt="Imagem da Ilustração1" class="ImagemainProduct" onclick="changeImage(this)" id="mainImage">
          </button>
          <button class="thumbnail">
            <img alt="Imagem da Ilustração2" class="Image2Product" onclick="changeImage(this)" id="image2">
          </button>
          <button class="thumbnail">
            <img alt="Imagem da Ilustração3" class="Image3Product" onclick="changeImage(this)" id="image3">
          </button>
        </div>
      </div>

      <!-- Right Column - Product Details -->
      <div class="product-details">
        <h1 id="name" class="Semi-Bold"></h1>
					<p id="product-Materials" class="Light">

					</p>
					<p id="product-Text"class="Extra-Light">

					</p>
				<button  class="snipcart-add-item cta-primary"
					data-item-id="wanderer-vessel-tshirt"
  					data-item-price="45.00"
  					data-item-url="Product-mockup.html"
					data-item-name="Wanderer Vessel"
  					data-item-description="Ilustração original inspirada em viagens marítimas, 100% algodão orgânico"
					data-item-custom1-name="Tamanho"
					data-item-custom1-options="XS|S|M|L|XL|XXL">
          Comprar Agora
				</button>
        </div>
      </div>
      
    </div>

<!-- Explorar Coleção -->
<section class="explore-section" id="explore-section">
    <div class="explore-container">
        <div class="section-header">
            <h2 class="section-title">Explorar Coleção</h2>
        </div>
        <div class="explore-grid">
            <a class="explore-card" id="explore-prev" href="#">
                <div class="explore-card__direction">← Anterior</div>
                <div class="explore-card__image-wrap">
                    <img id="explore-prev-img" src="" alt="">
                </div>
                <div class="explore-card__info">
                    <span class="explore-card__name" id="explore-prev-name"></span>
                    <span class="explore-card__price" id="explore-prev-price"></span>
                </div>
            </a>
            <a class="explore-card" id="explore-next" href="#">
                <div class="explore-card__direction">Próximo →</div>
                <div class="explore-card__image-wrap">
                    <img id="explore-next-img" src="" alt="">
                </div>
                <div class="explore-card__info">
                    <span class="explore-card__name" id="explore-next-name"></span>
                    <span class="explore-card__price" id="explore-next-price"></span>
                </div>
            </a>
        </div>
    </div>
</section>

<div id="footer-placeholder"></div>
<script src="product.js"></script>

</html>
