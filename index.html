<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="cSS.css" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="https://use.typekit.net/uhg8sos.css">
		<link rel="stylesheet" href="https://use.typekit.net/yiz2qnq.css">
        <title>Clover Prints</title>
		<link rel="icon" href="SGVs/calendarmy.svg" type="image/x-icon" />
    </head>
    <body>
        <header id="header-placeholder"></header>
    <!-- Hero Banner -->
    <div class="banner">
        <div class="banner__inner">
            <span class="banner__eyebrow">Coleção 2025</span>
            <h1 class="banner__heading">Ilustrações<br>de Autor</h1>
            <p class="banner__sub">T-shirts em algodão orgânico, edição limitada.<br>Cada peça, uma história.</p>
        </div>
    </div>
  <style>
    .activemenu {
      color: var(--se) !important;
      font-weight: 400;
    }
  </style>

    <!-- Product Grid -->
    <section class="product-section" id="produtos">
        <div class="product-container">
            <div class="section-header">
                <h2 class="section-title">Produtos</h2>
                <span class="section-badge">Edição Limitada</span>
            </div>
            <div class="product-grid" id="product-grid">
                <!-- preenchido dinamicamente via products.json -->
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>
	<script src="Javascript.js"></script>
</body>
</html>
