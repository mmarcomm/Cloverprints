<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<header>
  <!-- Checkbox sibling of overlay + mobile panel (used by ~ selector) -->
  <input type="checkbox" class="toggle-checkbox" id="menu-toggle-checkbox" />

  <div class="navbar">
    <div class="logo-container">
      <a href="index.html">
        <img src="SGVs/logo1.svg" alt="Clover Prints" class="logo" />
      </a>
    </div>

    <!-- Desktop inline nav -->
    <nav class="nav-desktop">
      <ul id="navgatorList">
        <li><a href="store.html">Produtos</a></li>
        <li><a href="projects.html">Projetos</a></li>
        <li><a href="about.html">Sobre</a></li>
        <li><a href="about.html#conectar">Conectar</a></li>
      </ul>
    </nav>

    <!-- Right-side actions: cart + mobile hamburger -->
    <div class="navbar__actions">
      <a href="#" class="cart-button snipcart-checkout" aria-label="Abrir carrinho">
        <svg class="cart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 8h12l-.9 11.1a1.5 1.5 0 0 1-1.5 1.4H8.4a1.5 1.5 0 0 1-1.5-1.4L6 8Z"/>
          <path d="M9 8V6.2a3 3 0 0 1 6 0V8"/>
        </svg>
        <span class="cart-count snipcart-items-count" aria-hidden="true">0</span>
      </a>

      <!-- Mobile hamburger / close -->
      <div class="menu__toggle">
        <label for="menu-toggle-checkbox"
               class="menu-button menu-open-btn"
               aria-label="Abrir menu">
          <img src="SGVs/menu.svg" alt="" class="hamburger-icon" aria-hidden="true" />
        </label>
        <label for="menu-toggle-checkbox"
               class="menu-button menu-close-btn"
               aria-label="Fechar menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </label>
      </div>
    </div>
  </div>

  <!-- Overlay and mobile dropdown panel (siblings of checkbox) -->
  <label for="menu-toggle-checkbox" class="menu-overlay" aria-hidden="true"></label>

  <nav class="menu__links" id="menu-panel" role="navigation">
    <ul class="mobile-nav-list">
      <li><a href="store.html">Produtos</a></li>
      <li><a href="projects.html">Projetos</a></li>
      <li><a href="about.html">Sobre</a></li>
      <li><a href="about.html#conectar">Conectar</a></li>
    </ul>
  </nav>
</header>
</body>
</html>
