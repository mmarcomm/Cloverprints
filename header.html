<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/header.css" rel="stylesheet" type="text/css">
</head>
<body>
<header>
  <!-- Checkbox sibling of overlay + mobile panel (used by ~ selector) -->
  <input type="checkbox" class="toggle-checkbox" id="menu-toggle-checkbox" />

  <div class="navbar">
    <div class="logo-container">
      <a href="index.html">
        <img src="SGVs/logo1.svg" alt="Clover Prints" class="logo" />
      </a>
    </div>

    <!-- Desktop inline nav -->
    <nav class="nav-desktop">
      <ul id="navgatorList">
        <li><a href="index.html">Produtos</a></li>
        <li><a href="Exposições.html">Projetos</a></li>
        <li><a href="Sobre.html">Sobre</a></li>
        <li><a href="Sobre.html#conectar">Conectar</a></li>
      </ul>
    </nav>

    <!-- Mobile hamburger / close -->
    <div class="menu__toggle">
      <label for="menu-toggle-checkbox"
             class="menu-button menu-open-btn"
             aria-label="Abrir menu">
        <img src="SGVs/menu.svg" alt="" class="hamburger-icon" aria-hidden="true" />
      </label>
      <label for="menu-toggle-checkbox"
             class="menu-button menu-close-btn"
             aria-label="Fechar menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </label>
    </div>
  </div>

  <!-- Overlay and mobile dropdown panel (siblings of checkbox) -->
  <label for="menu-toggle-checkbox" class="menu-overlay" aria-hidden="true"></label>

  <nav class="menu__links" id="menu-panel" role="navigation">
    <ul class="mobile-nav-list">
      <li><a href="index.html">Produtos</a></li>
      <li><a href="Exposições.html">Projetos</a></li>
      <li><a href="Sobre.html">Sobre</a></li>
      <li><a href="Sobre.html#conectar">Conectar</a></li>
    </ul>
  </nav>
</header>
</body>
</html>
